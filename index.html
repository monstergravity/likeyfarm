<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8ec8e8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Likey Farm — Small steps grow brighter days</title>
  <meta name="description" content="Build gentle habits, find calm in anxious moments, and grow a farm that stays beside you." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene" aria-hidden="true">
    <picture>
      <source media="(max-width: 720px)" srcset="assets/likey-hero-mobile.png" />
      <img class="scene__bg" src="assets/likey-hero-scene.png" alt="" />
    </picture>
    <div class="scene__glow"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="#top" aria-label="Likey Farm home">
      <img class="brand__mark" src="assets/likey-logo.png" alt="" width="40" height="40" />
      <span class="brand__name">Likey Farm</span>
    </a>
  </header>

  <main id="top" class="hero">
    <div class="hero__copy">
      <p class="hero__eyebrow">A little care grows</p>
      <h1 class="hero__title">Small steps grow brighter days.</h1>
      <p class="hero__sub">
        Build gentle habits, find calm in anxious moments, and grow a farm that stays beside you.
      </p>

      <div class="hero__actions">
        <a class="store-btn" href="#" aria-disabled="true">
          <svg class="store-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          <span class="store-btn__text">
            <span class="store-btn__label">Coming soon on the</span>
            <span class="store-btn__store">App Store</span>
          </span>
        </a>
      </div>

      <div class="hero__proof">
        <span class="hero__score" aria-hidden="true">5.0</span>
        <div class="hero__ratings">
          <div class="stars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <p>Loved by early farmers</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
